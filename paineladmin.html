<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin - All Mix</title>
  <style>
    :root{
      --bg:#080808;
      --bg-soft:#111111;
      --card:#151515;
      --card-2:#1b1b1b;
      --line:#2c2c2c;
      --text:#ffffff;
      --muted:#c5c5c5;
      --muted-2:#8e8e8e;
      --primary:#d90429;
      --primary-2:#ff1f45;
      --green:#16a34a;
      --danger:#ef4444;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(217,4,41,.14), transparent 24%),
        linear-gradient(180deg,#0c0c0c,#070707);
      color:var(--text);
    }

    .container{
      width:min(1220px, calc(100% - 28px));
      margin:0 auto;
    }

    .hero{
      padding:28px 0 8px;
    }

    .hero-box{
      background:
        linear-gradient(135deg, rgba(217,4,41,.16), rgba(255,255,255,.02)),
        linear-gradient(180deg, #131313 0%, #0e0e0e 100%);
      border:1px solid rgba(255,255,255,.06);
      border-radius:30px;
      padding:28px;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
    }

    h1,h2,h3,p{margin-top:0}
    h1{margin-bottom:8px;font-size:clamp(28px,4vw,46px)}
    h1 span{color:var(--primary-2)}
    .subtitle{margin:0;color:var(--muted);line-height:1.5}

    .back-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 18px;
      border-radius:18px;
      background:#121212;
      border:1px solid var(--line);
      color:#fff;
      text-decoration:none;
      font-weight:800;
      white-space:nowrap;
    }

    .back-link:hover{color:var(--primary-2);border-color:rgba(255,31,69,.45)}

    .card{
      background:linear-gradient(180deg,#161616,#111111);
      border:1px solid var(--line);
      border-radius:26px;
      padding:20px;
      box-shadow:var(--shadow);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin:20px 0;
    }

    .stack{display:grid;gap:20px}

    label{
      display:block;
      font-weight:800;
      margin:0 0 8px;
    }

    input, textarea, select{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:14px 16px;
      background:#0d0d0d;
      border:1px solid #282828;
      color:#fff;
      margin-bottom:14px;
    }

    textarea{
      min-height:118px;
      resize:vertical;
    }

    input:focus, textarea:focus, select:focus{
      border-color:rgba(255,31,69,.5);
      box-shadow:0 0 0 4px rgba(217,4,41,.12);
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      cursor:pointer;
      padding:13px 16px;
      border-radius:16px;
      font-weight:900;
      transition:.22s ease;
    }

    button:hover{transform:translateY(-2px)}

    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
    }

    .btn-secondary{
      background:#1a1a1a;
      color:#fff;
      border:1px solid #2f2f2f;
    }

    .btn-success{
      background:linear-gradient(135deg,#138b42,#1bb757);
      color:#fff;
    }

    .btn-danger{
      background:linear-gradient(135deg,#b91c1c,#ef4444);
      color:#fff;
    }

    .note{
      color:var(--muted-2);
      font-size:14px;
      line-height:1.45;
    }

    .hidden{display:none !important}

    .preview{
      width:150px;
      height:150px;
      object-fit:contain;
      background:#fff;
      border-radius:18px;
      padding:10px;
      border:1px solid #ddd;
      margin-bottom:14px;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .item{
      border:1px solid #2b2b2b;
      background:rgba(255,255,255,.02);
      border-radius:18px;
      padding:14px;
    }

    .item strong{
      font-size:17px;
      display:block;
      margin-bottom:6px;
    }

    .item .meta{
      color:var(--muted);
      line-height:1.45;
      font-size:14px;
    }

    .login-wrap{
      max-width:520px;
      margin:26px auto 0;
    }

    .login-title{
      margin-bottom:6px;
      font-size:28px;
    }

    .top-space{margin-top:20px}

    @media (max-width: 960px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <div class="hero-box">
        <div>
          <h1>Painel <span>Admin</span> All Mix</h1>
          <p class="subtitle">Cadastro de Itens.</p>
        </div>
        <a href="index.html" class="back-link">Voltar para o catálogo</a>
      </div>

      <div class="login-wrap card" id="loginCard">
        <h2 class="login-title">Entrar no painel</h2>
        <p class="note">Digite sua senha: <strong>Ex:1234</strong></p>

        <label for="senha">Senha do painel</label>
        <input type="password" id="senha" placeholder="Digite a senha">
        <div class="btns">
          <button class="btn-primary" onclick="login()">Entrar</button>
        </div>
      </div>

      <div id="panel" class="hidden">
        <div class="grid">
          <div class="card">
            <h2>Criar categoria</h2>

            <label for="catName">Nome da categoria</label>
            <input type="text" id="catName" placeholder="Ex.: Impressoras">

            <label for="catSlug">Slug da categoria</label>
            <input type="text" id="catSlug" placeholder="Ex.: impressoras">

            <div class="btns">
              <button class="btn-primary" onclick="saveCategory()">Salvar categoria</button>
            </div>
          </div>

          <div class="card">
            <h2>Categorias cadastradas</h2>
            <div class="list" id="categoryList"></div>
          </div>
        </div>

        <div class="grid">
          <div class="card">
            <h2>Criar etiqueta</h2>

            <label for="tagName">Nome da etiqueta</label>
            <input type="text" id="tagName" placeholder="Ex.: OFERTA RELÂMPAGO">

            <div class="btns">
              <button class="btn-primary" onclick="saveTag()">Salvar etiqueta</button>
            </div>
          </div>

          <div class="card">
            <h2>Etiquetas cadastradas</h2>
            <div class="list" id="tagList"></div>
          </div>
        </div>

        <div class="grid">
          <div class="card">
            <h2>Adicionar produto</h2>

            <label for="nome">Nome do produto</label>
            <input type="text" id="nome" placeholder="Nome do produto">

            <label for="descricao">Descrição</label>
            <textarea id="descricao" placeholder="Descrição do produto"></textarea>

            <label for="preco">Preço</label>
            <input type="number" id="preco" step="0.01" placeholder="Ex.: 1499.90">

            <label for="tag">Etiqueta</label>
            <select id="tag"></select>

            <label for="categoria">Categoria</label>
            <select id="categoria"></select>

            <label for="imagem">Imagem</label>
            <input type="file" id="imagem" accept="image/*">

            <img id="preview" class="preview hidden" alt="Prévia da imagem">

            <div class="btns">
              <button class="btn-success" onclick="saveProduct()">Salvar produto</button>
              <button class="btn-danger" onclick="clearExtraProducts()">Apagar produtos criados</button>
            </div>
          </div>

          <div class="stack">
            <div class="card">
              <h2>Produtos criados no painel</h2>
              <div class="list" id="productList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const DEFAULT_CATEGORIES = [
      { slug:'gamer', name:'PC Gamer' },
      { slug:'office', name:'PC Escritório' },
      { slug:'kit', name:'Kits' },
      { slug:'monitor', name:'Monitores' },
      { slug:'nobreak', name:'Nobreak' }
    ];

    const DEFAULT_TAGS = ['PROMOÇÃO', 'NOVIDADE', 'QUEIMA DE ESTOQUE'];

    function slugify(text){
      return String(text || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]+/g,'-')
        .replace(/^-+|-+$/g,'');
    }

    function getExtraCategories(){
      return JSON.parse(localStorage.getItem('allmix_categories') || '[]');
    }

    function saveExtraCategories(list){
      localStorage.setItem('allmix_categories', JSON.stringify(list));
    }

    function getAllCategories(){
      const all = [...DEFAULT_CATEGORIES];
      getExtraCategories().forEach(cat => {
        if(!all.some(c => c.slug === cat.slug)) all.push(cat);
      });
      return all;
    }

    function getExtraTags(){
      return JSON.parse(localStorage.getItem('allmix_tags') || '[]');
    }

    function saveExtraTags(list){
      localStorage.setItem('allmix_tags', JSON.stringify(list));
    }

    function getAllTags(){
      const all = [...DEFAULT_TAGS];
      getExtraTags().forEach(tag => {
        if(!all.some(t => t.toLowerCase() === String(tag).toLowerCase())) all.push(tag);
      });
      return all;
    }

    function getExtraProducts(){
      return JSON.parse(localStorage.getItem('allmix_products') || '[]');
    }

    function saveExtraProducts(list){
      localStorage.setItem('allmix_products', JSON.stringify(list));
    }

    function login(){
      if(document.getElementById('senha').value === 'allmixvip'){
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('panel').classList.remove('hidden');
        renderCategories();
        renderTags();
        renderProducts();
      } else {
        alert('Senha incorreta.');
      }
    }

    document.getElementById('catName').addEventListener('input', function(){
      document.getElementById('catSlug').value = slugify(this.value);
    });

    document.getElementById('tagName').addEventListener('input', function(){
      this.value = this.value.toUpperCase();
    });

    document.getElementById('imagem').addEventListener('change', function(){
      const file = this.files[0];
      const preview = document.getElementById('preview');

      if(!file){
        preview.classList.add('hidden');
        preview.src = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(){
        preview.src = reader.result;
        preview.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    });

    function renderCategories(){
      const select = document.getElementById('categoria');
      const list = document.getElementById('categoryList');
      const categories = getAllCategories();

      select.innerHTML = categories.map(cat =>
        `<option value="${cat.slug}">${cat.name}</option>`
      ).join('');

      list.innerHTML = categories.map(cat => {
        const isDefault = DEFAULT_CATEGORIES.some(c => c.slug === cat.slug);
        return `
          <div class="item">
            <strong>${cat.name}</strong>
            <div class="meta">Slug: ${cat.slug}</div>
            <div class="meta">${isDefault ? 'Categoria padrão do sistema' : 'Categoria criada no painel'}</div>
            <div class="btns top-space">
              ${isDefault ? '' : `<button class="btn-danger" onclick="removeCategory('${cat.slug}')">Remover categoria</button>`}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTags(){
      const select = document.getElementById('tag');
      const list = document.getElementById('tagList');
      const tags = getAllTags();

      select.innerHTML = tags.map(tag =>
        `<option value="${tag}">${tag}</option>`
      ).join('');

      list.innerHTML = tags.map(tag => {
        const isDefault = DEFAULT_TAGS.some(t => t.toLowerCase() === String(tag).toLowerCase());
        return `
          <div class="item">
            <strong>${tag}</strong>
            <div class="meta">${isDefault ? 'Etiqueta padrão do sistema' : 'Etiqueta criada no painel'}</div>
            <div class="btns top-space">
              ${isDefault ? '' : `<button class="btn-danger" onclick="removeTag(${JSON.stringify(tag)})">Remover etiqueta</button>`}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderProducts(){
      const list = document.getElementById('productList');
      const products = getExtraProducts();

      if(!products.length){
        list.innerHTML = `<div class="item"><div class="meta">Nenhum produto criado no painel ainda.</div></div>`;
        return;
      }

      list.innerHTML = products.map((p, i) => `
        <div class="item">
          <strong>${p.nome}</strong>
          <div class="meta">${p.descricao || ''}</div>
          <div class="meta">Preço: ${Number(p.preco).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div>
          <div class="meta">Categoria: ${p.categoria}</div>
          <div class="meta">Etiqueta: ${p.tag}</div>
          <div class="btns top-space">
            <button class="btn-secondary" onclick="editProduct(${i})">Editar</button>
            <button class="btn-danger" onclick="removeProduct(${i})">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    function saveCategory(){
      const name = document.getElementById('catName').value.trim();
      const slug = slugify(document.getElementById('catSlug').value.trim() || name);

      if(!name || !slug){
        alert('Preencha nome e slug da categoria.');
        return;
      }

      const extras = getExtraCategories();

      if(getAllCategories().some(c => c.slug === slug)){
        alert('Já existe uma categoria com esse slug.');
        return;
      }

      extras.push({ name, slug });
      saveExtraCategories(extras);

      document.getElementById('catName').value = '';
      document.getElementById('catSlug').value = '';
      renderCategories();
      alert('Categoria salva com sucesso.');
    }

    function removeCategory(slug){
      const products = getExtraProducts();
      const categoryInUse = products.some(p => p.categoria === slug);

      if(categoryInUse){
        alert('Não dá para remover essa categoria porque existe produto usando ela.');
        return;
      }

      const updated = getExtraCategories().filter(cat => cat.slug !== slug);
      saveExtraCategories(updated);
      renderCategories();
      alert('Categoria removida com sucesso.');
    }

    function saveTag(){
      const tagName = document.getElementById('tagName').value.trim().toUpperCase();

      if(!tagName){
        alert('Digite o nome da etiqueta.');
        return;
      }

      const extras = getExtraTags();

      if(getAllTags().some(tag => String(tag).toLowerCase() === tagName.toLowerCase())){
        alert('Essa etiqueta já existe.');
        return;
      }

      extras.push(tagName);
      saveExtraTags(extras);
      document.getElementById('tagName').value = '';
      renderTags();
      alert('Etiqueta salva com sucesso.');
    }

    function removeTag(tagName){
      const products = getExtraProducts();
      const tagInUse = products.some(p => String(p.tag || '').toLowerCase() === String(tagName).toLowerCase());

      if(tagInUse){
        alert('Não dá para remover essa etiqueta porque existe produto usando ela.');
        return;
      }

      const updated = getExtraTags().filter(tag => String(tag).toLowerCase() !== String(tagName).toLowerCase());
      saveExtraTags(updated);
      renderTags();
      alert('Etiqueta removida com sucesso.');
    }

    function saveProduct(){
      const nome = document.getElementById('nome').value.trim();
      const descricao = document.getElementById('descricao').value.trim();
      const preco = parseFloat(document.getElementById('preco').value);
      const tag = document.getElementById('tag').value.trim() || 'PROMOÇÃO';
      const categoria = document.getElementById('categoria').value;
      const file = document.getElementById('imagem').files[0];

      if(!nome || !preco || !categoria || !file){
        alert('Preencha nome, preço, categoria e imagem.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(){
        const products = getExtraProducts();
        products.push({
          id: slugify(nome),
          nome,
          descricao,
          preco,
          tag,
          categoria,
          imagem: reader.result
        });

        saveExtraProducts(products);

        document.getElementById('nome').value = '';
        document.getElementById('descricao').value = '';
        document.getElementById('preco').value = '';
        document.getElementById('tag').value = getAllTags()[0] || '';
        document.getElementById('imagem').value = '';
        document.getElementById('preview').src = '';
        document.getElementById('preview').classList.add('hidden');

        renderProducts();
        alert('Produto salvo com sucesso.');
      };

      reader.readAsDataURL(file);
    }

    function editProduct(index){
      const products = getExtraProducts();
      const product = products[index];

      if(!product){
        alert('Produto não encontrado.');
        return;
      }

      const novoNome = prompt('Editar nome do produto:', product.nome);
      if(novoNome === null) return;

      const novaDescricao = prompt('Editar descrição do produto:', product.descricao || '');
      if(novaDescricao === null) return;

      const novoPrecoTexto = prompt('Editar preço do produto:', product.preco);
      if(novoPrecoTexto === null) return;
      const novoPreco = parseFloat(String(novoPrecoTexto).replace(',', '.'));

      if(!novoNome.trim() || !novoPreco){
        alert('Nome e preço precisam ser válidos.');
        return;
      }

      const novaTag = prompt('Editar etiqueta (PROMOÇÃO, NOVIDADE ou QUEIMA DE ESTOQUE):', product.tag || 'PROMOÇÃO');
      if(novaTag === null) return;

      const novaCategoria = prompt('Editar categoria (slug):', product.categoria);
      if(novaCategoria === null) return;

      products[index] = {
        ...product,
        id: slugify(novoNome),
        nome: novoNome.trim(),
        descricao: novaDescricao.trim(),
        preco: novoPreco,
        tag: novaTag.trim() || 'PROMOÇÃO',
        categoria: novaCategoria.trim() || product.categoria
      };

      saveExtraProducts(products);
      renderProducts();
      alert('Produto editado com sucesso.');
    }

    function removeProduct(index){
      const products = getExtraProducts();
      products.splice(index, 1);
      saveExtraProducts(products);
      renderProducts();
    }

    function clearExtraProducts(){
      if(confirm('Deseja apagar todos os produtos criados no painel?')){
        localStorage.removeItem('allmix_products');
        renderProducts();
      }
    }
  </script>
</body>
</html>
